AllCops:
  TargetRubyVersion: 3.2
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - 'db/schema.rb'
    - 'bin/**/*'
    - 'node_modules/**/*'
    - 'vendor/**/*'

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 30
  Exclude:
    - 'app/controllers/sessions_controller.rb'

Metrics/ClassLength:
  Max: 150

Metrics/BlockLength:
  Exclude:
    - 'config/**/*'
    - 'spec/**/*'
    - 'db/seeds.rb'

Layout/LineLength:
  Max: 130

Style/FrozenStringLiteralComment:
  Enabled: false